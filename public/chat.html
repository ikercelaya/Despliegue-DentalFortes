<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prueba del asistente · Dental Fortes</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:radial-gradient(circle at 30% 20%,#2a2a2a,#1a1a1a 60%,#0d0d0d);color:#e8e8e8;}
    .card{max-width:440px;text-align:center;padding:32px;}
    h1{font-size:20px;font-weight:600;margin:0 0 8px;}
    p{color:#9a9a9a;font-size:14px;line-height:1.5;}
    .tag{display:inline-block;margin-top:6px;font-size:12px;color:#777;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Asistente virtual · Dental Fortes</h1>
    <p>Página de prueba interna. Pulsa la <strong>burbuja de chat</strong> de abajo a la
       derecha y escribe como si fueras un paciente (por ejemplo: “tengo un dolor de muelas
       muy fuerte”, o “quería pedir cita para una revisión”).</p>
    <p class="tag">Las conversaciones y citas aparecen en el panel /admin.</p>
  </div>
  <!-- Mismo dominio: no hace falta data-api -->
  <script src="/widget.js" defer></script>
</body>
</html>
