    <h4 style="margin:18px 0 8px;font-size:13px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px">Horarios</h4>
    <div id="schedList"></div>
    <button class="btn" id="addSched" style="margin-top:8px">+ Añadir franja</button>
    <h4 style="margin:18px 0 8px;font-size:13px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px">Vacaciones</h4>
    <div style="color:var(--text-3);font-size:12px;margin-bottom:8px">Días en los que el bot NO agendará citas con este profesional.</div>
    <div id="vacList"></div>
    <button class="btn" id="addVac" style="margin-top:8px">+ Añadir vacaciones</button>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="saveProf">Guardar</button>
    </div>
  `, { onMount: (body) => {
    function paintSchedules() {
      body.querySelector("#schedList").innerHTML = schedules.map((s, i) => `
        <div class="row" style="grid-template-columns:1fr 1fr 1fr auto;align-items:end">
          <div class="field"><label>Día</label>
            <select class="select" data-i="${i}" data-k="weekday">
              ${WEEKDAY_LABEL.map((d,wi) => `<option value="${wi}" ${s.weekday==wi?"selected":""}>${d}</option>`).join("")}
            </select>
          </div>
          <div class="field"><label>Inicio</label><input class="input" type="time" data-i="${i}" data-k="start_time" value="${(s.start_time||"09:00").slice(0,5)}" /></div>
          <div class="field"><label>Fin</label><input class="input" type="time" data-i="${i}" data-k="end_time" value="${(s.end_time||"14:00").slice(0,5)}" /></div>
          <button class="btn danger" data-rm="${i}" style="margin-bottom:0">×</button>
        </div>
      `).join("");
      body.querySelectorAll("#schedList [data-i]").forEach(el => {
        el.addEventListener("change", (e) => {
          const i = Number(e.target.dataset.i);
          schedules[i][e.target.dataset.k] = e.target.dataset.k === "weekday" ? Number(e.target.value) : e.target.value;
        });
      });
      body.querySelectorAll("#schedList [data-rm]").forEach(b => {
        b.addEventListener("click", () => { schedules.splice(Number(b.dataset.rm), 1); paintSchedules(); });
      });
    }
    paintSchedules();
    body.querySelector("#addSched").onclick = () => { schedules.push({ weekday: 0, start_time: "09:30", end_time: "14:00" }); paintSchedules(); };

    function paintVacations() {
      body.querySelector("#vacList").innerHTML = vacations.length ? vacations.map((v, i) => `
        <div class="row" style="grid-template-columns:1fr 1fr auto;align-items:end;margin-bottom:8px">
          <div class="field"><label>Inicio</label><input class="input" type="date" data-vi="${i}" data-vk="start_date" value="${v.start_date||""}" /></div>
          <div class="field"><label>Fin</label><input class="input" type="date" data-vi="${i}" data-vk="end_date" value="${v.end_date||""}" /></div>
          <button class="btn danger" data-vrm="${i}" style="margin-bottom:0">×</button>
        </div>
      `).join("") : `<div style="color:var(--text-3);font-size:12px">Sin vacaciones registradas.</div>`;
      body.querySelectorAll("#vacList [data-vi]").forEach(el => {
        el.addEventListener("change", (e) => { vacations[Number(e.target.dataset.vi)][e.target.dataset.vk] = e.target.value; });
      });
      body.querySelectorAll("#vacList [data-vrm]").forEach(b => {
        b.addEventListener("click", () => { vacations.splice(Number(b.dataset.vrm), 1); paintVacations(); });
      });
    }
    paintVacations();
    body.querySelector("#addVac").onclick = () => { vacations.push({ start_date: "", end_date: "" }); paintVacations(); };

    body.querySelector("#saveProf").onclick = async () => {
      // Cada rango necesita inicio y fin; si falta fin, se usa el inicio (un solo día).
      const cleanVacs = vacations
        .filter(v => v.start_date)
        .map(v => ({ start_date: v.start_date, end_date: v.end_date || v.start_date }));
      const payload = {
        name: body.querySelector("#proName").value.trim(),
        specialty: body.querySelector("#proSpec").value.trim(),
        color: body.querySelector("#proColor").value,
        active: body.querySelector("#proActive").value === "true",
        is_generalist: body.querySelector("#proGeneralist").value === "true",
        schedules,
        vacations: cleanVacs,
      };
      if (!payload.name || !payload.specialty) { toast("Faltan datos", "error"); return; }
      try {
        if (existing) await api(`/api/professionals/${existing.id}`, { method: "PATCH", body: payload });
        else await api("/api/professionals", { method: "POST", body: payload });
        toast("Guardado", "success"); closeModal(); renderProfessionals();
      } catch (err) { toast(err.message, "error"); }
    };
  }});
}

        <select class="select" id="trtFirst"><option value="false" ${!t.is_first_visit?"selected":""}>No</option><option value="true" ${t.is_first_visit?"selected":""}>Sí</option></select>
      </div>
      <div class="field"><label>Activo</label>
        <select class="select" id="trtActive"><option value="true" ${t.active!==false?"selected":""}>Sí</option><option value="false" ${t.active===false?"selected":""}>No</option></select>
      </div>
    </div>
    <div class="row single"><div class="field">
      <label>Profesionales que cubren este tratamiento</label>
      <div class="trt-pros" id="trtPros">
        ${cache.professionals.map(p => `<label class="trt-pro-chk"><input type="checkbox" value="${p.id}" ${(t.professional_ids||[]).includes(p.id)?"checked":""}/> <span>${escapeHtml(p.name)}</span></label>`).join("") || '<span style="color:var(--text-3);font-size:13px">No hay profesionales.</span>'}
      </div>
      <small style="color:var(--text-3);font-size:11px">El bot solo asignará este tratamiento a los profesionales marcados. Si no marcas ninguno, decidirá por especialidad.</small>
    </div></div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="saveTrt">Guardar</button>
    </div>
  `, { onMount: (body) => {
    body.querySelector("#saveTrt").onclick = async () => {
      const priceRaw = body.querySelector("#trtPrice").value.trim();
      const payload = {
        name: body.querySelector("#trtName").value.trim(),
        duration_minutes: Number(body.querySelector("#trtDur").value) || 30,
        description: body.querySelector("#trtDesc").value.trim() || null,
        price_eur: priceRaw === "" ? null : Number(priceRaw),
        is_first_visit: body.querySelector("#trtFirst").value === "true",
        active: body.querySelector("#trtActive").value === "true",
        professional_ids: Array.from(body.querySelectorAll("#trtPros input:checked")).map(i => i.value),
      };
      if (!payload.name) { toast("Falta el nombre", "error"); return; }
      try {
        if (existing) await api(`/api/treatments/${existing.id}`, { method: "PATCH", body: payload });
        else await api("/api/treatments", { method: "POST", body: payload });
        toast("Guardado", "success"); closeModal(); renderTreatments();
      } catch (err) { toast(err.message, "error"); }
    };
  }});
}

// ---------------- ARRANQUE ----------------
checkSession();
</script>
</body>
</html>
