    nameInput.addEventListener("blur", () => {
      nameInput.value = nameInput.value
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9_]+/g, "_")
        .replace(/^_+|_+$/g, "");
    });

    body.querySelector("#saveTpl").onclick = async () => {
      const btn = body.querySelector("#saveTpl");
      const result = body.querySelector("#tplResult");
      result.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Creando…";
      try {
        const data = await api("/api/marketing/templates", { method: "POST", body: {
          name: body.querySelector("#tplName").value.trim(),
          category: body.querySelector("#tplCategory").value,
          language: body.querySelector("#tplLanguage").value,
          header_text: body.querySelector("#tplHeader").value.trim(),
          body_text: body.querySelector("#tplBody").value.trim(),
          body_examples: body.querySelector("#tplExamples").value.trim(),
          footer_text: body.querySelector("#tplFooter").value.trim(),
          allow_category_change: true,
        }});
        const status = data.template?.status || "en revisión";
        const id = data.template?.id || "sin id devuelto";
        result.style.display = "block";
        result.innerHTML = `<strong>Plantilla enviada a Meta.</strong><br>Nombre: ${escapeHtml(data.submitted?.name || "")}<br>ID: ${escapeHtml(id)}<br>Estado: ${escapeHtml(status)}`;
        toast("Plantilla enviada a Meta", "success");
      } catch (err) {
        result.style.display = "block";
        result.innerHTML = `<strong>No se pudo crear la plantilla.</strong><br>${escapeHtml(err.message)}`;
        toast(err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Crear en Meta";
      }
    };
  }});
}

// Diagnóstico de la conexión con Meta (WhatsApp) — usa las variables reales del servidor
function openDiagnoseModal() {
  openModal(`
    <h3>Diagnóstico de WhatsApp / Meta</h3>
    <div id="diagBody" class="empty-state" style="text-align:left;padding:8px 2px">Comprobando…</div>
    <div class="actions"><button class="btn" onclick="closeModal()">Cerrar</button></div>
  `, { onMount: async (body) => {
    const el = body.querySelector("#diagBody");
    const row = (label, ok, extra) =>
      `<div style="display:flex;gap:8px;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--line)">
        <span style="width:16px">${ok === null ? "•" : ok ? "✅" : "❌"}</span>
        <div><strong>${escapeHtml(label)}</strong>${extra ? `<div class="mini-note">${escapeHtml(extra)}</div>` : ""}</div>
      </div>`;
    try {
      const r = await api("/api/marketing/diagnose");
      const c = r.checks || {};
      el.innerHTML = `
        ${row("WHATSAPP_BUSINESS_ACCOUNT_ID (WABA)", r.env.waba_id_set, r.env.waba_id || "no configurado")}
        ${row("WHATSAPP_TOKEN", r.env.token_set, r.env.token_preview || "no configurado")}
        ${row("WHATSAPP_PHONE_NUMBER_ID", r.env.phone_number_id_set, r.env.phone_number_id_set ? "configurado" : "no configurado")}
        ${row("El token puede leer la WABA", c.leer_waba ? c.leer_waba.ok : null, c.leer_waba ? (c.leer_waba.ok ? ("Cuenta: " + (c.leer_waba.nombre || "") + (c.leer_waba.review ? " · Revisión: " + c.leer_waba.review : "") + (c.leer_waba.verificacion ? " · Negocio: " + c.leer_waba.verificacion : "")) : (c.leer_waba.error || "") + (c.leer_waba.code ? " (código " + c.leer_waba.code + ")" : "")) : "no comprobado")}
        ${row("El token puede listar plantillas", c.listar_plantillas ? c.listar_plantillas.ok : null, c.listar_plantillas ? (c.listar_plantillas.ok ? "Acceso de lectura correcto" : (c.listar_plantillas.error || "") + (c.listar_plantillas.code ? " (código " + c.listar_plantillas.code + ")" : "")) : "no comprobado")}
        ${row("El token puede CREAR plantillas", c.crear_plantilla ? c.crear_plantilla.ok : null, c.crear_plantilla ? (c.crear_plantilla.ok ? "Creación permitida" : (c.crear_plantilla.error || "") + (c.crear_plantilla.code ? " (código " + c.crear_plantilla.code + (c.crear_plantilla.subcode ? "/" + c.crear_plantilla.subcode : "") + ")" : "")) : "no comprobado")}
        <div style="margin-top:12px;padding:10px 12px;border-radius:8px;background:${r.ok ? "rgba(74,222,128,0.12)" : "rgba(248,113,113,0.12)"};color:${r.ok ? "#86efac" : "#fca5a5"}">
          <strong>${r.ok ? "Conexión correcta" : "Hay un problema"}</strong><br>${escapeHtml(r.conclusion || "")}
        </div>`;
    } catch (err) {
      el.innerHTML = `<div style="color:var(--danger)">No se pudo ejecutar el diagnóstico: ${escapeHtml(err.message)}</div>`;
    }
  }});
}

// ====================================================================
// 7) PROFESIONALES
// ====================================================================
async function renderProfessionals() {
  $main.innerHTML = `
    <div class="page-header">
      <h2>Profesionales</h2>
      <div class="actions"><button class="btn primary" id="newProBtn">+ Añadir</button></div>
    </div>
    <div class="card" id="proCard"><div class="empty-state">Cargando…</div></div>
  `;
  document.getElementById("newProBtn").onclick = () => openProfessionalModal();
  try {
    const { professionals } = await api("/api/professionals");
    cache.professionals = professionals;
    document.getElementById("proCard").innerHTML = `
      <table>
        <thead><tr><th>Nombre</th><th>Especialidad</th><th>Horarios</th><th>Color</th><th></th></tr></thead>
        <tbody>
          ${professionals.map(p => `
            <tr>
              <td><strong>${escapeHtml(p.name)}</strong></td>
              <td>${escapeHtml(p.specialty)}</td>
              <td style="font-size:12px;color:var(--text-2)">
                ${(p.df_professional_schedules||[]).map(s => `${WEEKDAY_LABEL[s.weekday]} ${s.start_time.slice(0,5)}-${s.end_time.slice(0,5)}`).join(" · ") || "—"}
              </td>
              <td><span style="display:inline-block;width:18px;height:18px;border-radius:50%;background:${p.color}"></span></td>
              <td><button class="btn" onclick='editProfessional(${JSON.stringify(JSON.stringify(p))})'>Editar</button></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  } catch (err) { toast(err.message, "error"); }
}
window.editProfessional = (json) => openProfessionalModal(JSON.parse(json));

function openProfessionalModal(existing) {
  const p = existing || { schedules: [] };
  const schedules = existing?.df_professional_schedules?.map(s => ({...s})) || [];
  openModal(`
    <h3>${existing ? "Editar profesional" : "Nuevo profesional"}</h3>
    <div class="row">
      <div class="field"><label>Nombre</label><input class="input" id="proName" value="${escapeHtml(p.name||"")}" /></div>
      <div class="field"><label>Especialidad</label><input class="input" id="proSpec" value="${escapeHtml(p.specialty||"")}" /></div>
    </div>
    <div class="row">
      <div class="field"><label>Color en agenda</label><input class="input" type="color" id="proColor" value="${p.color||"#9ca3af"}" /></div>
      <div class="field"><label>Activo</label>
        <select class="select" id="proActive"><option value="true" ${p.active!==false?"selected":""}>Sí</option><option value="false" ${p.active===false?"selected":""}>No</option></select>
      </div>
    </div>
    <div class="row">
      <div class="field"><label>Tipo de agenda</label>
        <select class="select" id="proGeneralist">
          <option value="false" ${p.is_generalist?"":"selected"}>Especialista — sus citas NO se reasignan</option>
          <option value="true" ${p.is_generalist?"selected":""}>Generalista — reasignable entre generalistas</option>
        </select>
      </div>
      <div class="field"></div>
    </div>
    <h4 style="margin:18px 0 8px;font-size:13px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px">Horarios</h4>
    <div id="schedList"></div>
    <button class="btn" id="addSched" style="margin-top:8px">+ Añadir franja</button>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="saveProf">Guardar</button>
    </div>
  `, { onMount: (body) => {
    function paintSchedules() {
      body.querySelector("#schedList").innerHTML = schedules.map((s, i) => `
        <div class="row" style="grid-template-columns:1fr 1fr 1fr auto;align-items:end">
          <div class="field"><label>Día</label>
            <select class="select" data-i="${i}" data-k="weekday">
              ${WEEKDAY_LABEL.map((d,wi) => `<option value="${wi}" ${s.weekday==wi?"selected":""}>${d}</option>`).join("")}
            </select>
          </div>
          <div class="field"><label>Inicio</label><input class="input" type="time" data-i="${i}" data-k="start_time" value="${(s.start_time||"09:00").slice(0,5)}" /></div>
          <div class="field"><label>Fin</label><input class="input" type="time" data-i="${i}" data-k="end_time" value="${(s.end_time||"14:00").slice(0,5)}" /></div>
          <button class="btn danger" data-rm="${i}" style="margin-bottom:0">×</button>
        </div>
      `).join("");
      body.querySelectorAll("#schedList [data-i]").forEach(el => {
        el.addEventListener("change", (e) => {
          const i = Number(e.target.dataset.i);
          schedules[i][e.target.dataset.k] = e.target.dataset.k === "weekday" ? Number(e.target.value) : e.target.value;
        });
      });
      body.querySelectorAll("#schedList [data-rm]").forEach(b => {
        b.addEventListener("click", () => { schedules.splice(Number(b.dataset.rm), 1); paintSchedules(); });
      });
    }
    paintSchedules();
    body.querySelector("#addSched").onclick = () => { schedules.push({ weekday: 0, start_time: "09:30", end_time: "14:00" }); paintSchedules(); };
    body.querySelector("#saveProf").onclick = async () => {
      const payload = {
        name: body.querySelector("#proName").value.trim(),
        specialty: body.querySelector("#proSpec").value.trim(),
        color: body.querySelector("#proColor").value,
        active: body.querySelector("#proActive").value === "true",
        is_generalist: body.querySelector("#proGeneralist").value === "true",
        schedules,
      };
      if (!payload.name || !payload.specialty) { toast("Faltan datos", "error"); return; }
      try {
        if (existing) await api(`/api/professionals/${existing.id}`, { method: "PATCH", body: payload });
        else await api("/api/professionals", { method: "POST", body: payload });
        toast("Guardado", "success"); closeModal(); renderProfessionals();
      } catch (err) { toast(err.message, "error"); }
    };
  }});
}

// ====================================================================
// 8) TRATAMIENTOS
// ====================================================================
async function renderTreatments() {
  $main.innerHTML = `
    <div class="page-header">
      <h2>Tratamientos</h2>
      <div class="actions"><button class="btn primary" id="newTrtBtn">+ Añadir</button></div>
    </div>
    <div class="card" id="trtCard"><div class="empty-state">Cargando…</div></div>
  `;
  document.getElementById("newTrtBtn").onclick = () => openTreatmentModal();
  try {
    const { treatments } = await api("/api/treatments");
    cache.treatments = treatments;
    document.getElementById("trtCard").innerHTML = `
      <table>
        <thead><tr><th>Nombre</th><th>Duración</th><th>Precio</th><th>Primera visita</th><th>Activo</th><th></th></tr></thead>
        <tbody>
          ${treatments.map(t => `
            <tr>
              <td><strong>${escapeHtml(t.name)}</strong>${t.description?`<div style="color:var(--text-3);font-size:12px">${escapeHtml(t.description)}</div>`:""}</td>
              <td>${t.duration_minutes} min</td>
              <td>${t.price_eur != null ? fmtEur(t.price_eur) : '<span style="color:var(--text-3)">—</span>'}</td>
              <td>${t.is_first_visit ? "Sí" : "No"}</td>
              <td>${t.active ? "Sí" : "No"}</td>
              <td>
                <button class="btn" onclick='editTreatment(${JSON.stringify(JSON.stringify(t))})'>Editar</button>
                <button class="btn danger" onclick='deleteTreatment("${t.id}")'>×</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  } catch (err) { toast(err.message, "error"); }
}
window.editTreatment = (json) => openTreatmentModal(JSON.parse(json));
window.deleteTreatment = async (id) => {
  if (!confirm("¿Eliminar tratamiento?")) return;
  try { await api(`/api/treatments/${id}`, { method: "DELETE" }); toast("Eliminado","success"); renderTreatments(); }
  catch (err) { toast(err.message, "error"); }
};

function openTreatmentModal(existing) {
  const t = existing || {};
  openModal(`
    <h3>${existing ? "Editar tratamiento" : "Nuevo tratamiento"}</h3>
    <div class="row">
      <div class="field"><label>Nombre</label><input class="input" id="trtName" value="${escapeHtml(t.name||"")}" /></div>
      <div class="field"><label>Duración (min)</label><input class="input" type="number" id="trtDur" value="${t.duration_minutes||30}" /></div>
    </div>
    <div class="row">
      <div class="field"><label>Precio (€)</label><input class="input" type="number" step="0.01" min="0" id="trtPrice" value="${t.price_eur != null ? t.price_eur : ""}" placeholder="Sin precio" /></div>
      <div class="field"><label style="opacity:.7">Genera un cobro pendiente al reservar</label><div style="padding:9px 0;color:var(--text-3);font-size:12px">Déjalo vacío para no cobrar por esta cita.</div></div>
    </div>
    <div class="row single"><div class="field"><label>Descripción</label><textarea class="textarea" id="trtDesc" rows="2">${escapeHtml(t.description||"")}</textarea></div></div>
    <div class="row">
      <div class="field"><label>Primera visita</label>
        <select class="select" id="trtFirst"><option value="false" ${!t.is_first_visit?"selected":""}>No</option><option value="true" ${t.is_first_visit?"selected":""}>Sí</option></select>
      </div>
      <div class="field"><label>Activo</label>
        <select class="select" id="trtActive"><option value="true" ${t.active!==false?"selected":""}>Sí</option><option value="false" ${t.active===false?"selected":""}>No</option></select>
      </div>
    </div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="saveTrt">Guardar</button>
    </div>
  `, { onMount: (body) => {
    body.querySelector("#saveTrt").onclick = async () => {
      const priceRaw = body.querySelector("#trtPrice").value.trim();
      const payload = {
        name: body.querySelector("#trtName").value.trim(),
        duration_minutes: Number(body.querySelector("#trtDur").value) || 30,
        description: body.querySelector("#trtDesc").value.trim() || null,
        price_eur: priceRaw === "" ? null : Number(priceRaw),
        is_first_visit: body.querySelector("#trtFirst").value === "true",
        active: body.querySelector("#trtActive").value === "true",
      };
      if (!payload.name) { toast("Falta el nombre", "error"); return; }
      try {
        if (existing) await api(`/api/treatments/${existing.id}`, { method: "PATCH", body: payload });
        else await api("/api/treatments", { method: "POST", body: payload });
        toast("Guardado", "success"); closeModal(); renderTreatments();
      } catch (err) { toast(err.message, "error"); }
    };
  }});
}

// ---------------- ARRANQUE ----------------
checkSession();
